services:
  postgres:
    image: postgres:16
    container_name: jansori-postgres
    environment:
      POSTGRES_USER: jansori
      POSTGRES_PASSWORD: jansori
      POSTGRES_DB: jansori
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jansori -d jansori"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
